services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      composery:
        condition: service_healthy

  composery:
    image: ghcr.io/sloikodavid/composery:latest
    restart: unless-stopped
    env_file: ./composery.env
    volumes:
      - composery_data:/data
    expose:
      - "8080"

volumes:
  composery_data:
  caddy_data:
