<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			http-equiv="Content-Security-Policy"
			content="style-src 'self'; script-src 'self'; manifest-src 'self'; img-src 'self' data:; font-src 'self' data:;"
		/>
		<meta name="color-scheme" content="light dark" />
		<title>Reset password</title>
		<link rel="icon" href="{{COMPOSERY_STATIC_BASE}}/src/browser/media/favicon-dark-support.svg" />
		<link rel="alternate icon" href="{{COMPOSERY_STATIC_BASE}}/src/browser/media/favicon.ico" />
		<link rel="manifest" href="{{BASE}}/manifest.json" crossorigin="use-credentials" />
		<link href="{{COMPOSERY_STATIC_BASE}}/src/browser/pages/global.css" rel="stylesheet" />
		<link href="{{COMPOSERY_STATIC_BASE}}/src/browser/pages/login.css" rel="stylesheet" />
		<meta id="coder-options" data-settings="{{OPTIONS}}" />
	</head>
	<body>
		<main class="page">
			<form class="login-form" method="post" autocomplete="on" aria-label="Reset password">
				<a
					class="login-logo-link"
					href="https://www.composery.io"
					target="_blank"
					rel="noopener"
					aria-label="Composery"
				>
					<img
						class="login-logo"
						src="{{COMPOSERY_STATIC_BASE}}/src/browser/media/composery-logo.svg"
						alt="Composery"
					/>
				</a>
				<input
					class="username"
					type="text"
					autocomplete="username"
				/>
				<input id="base" type="hidden" name="base" value="{{BASE}}" />
				<input id="href" type="hidden" name="href" value="" />
				<div class="auth-fields password-fields">
					<label class="sr-only" for="current-password">Current password</label>
					<div class="monaco-inputbox idle">
						<div class="ibwrapper">
							<input
								class="input empty"
								id="current-password"
								name="currentPassword"
								type="password"
								placeholder="Current password"
								autocomplete="current-password"
								autocorrect="off"
								autocapitalize="off"
								spellcheck="false"
								required
							/>
						</div>
					</div>
					<label class="sr-only" for="new-password">New password</label>
					<div class="monaco-inputbox idle">
						<div class="ibwrapper">
							<input
								class="input empty"
								id="new-password"
								name="newPassword"
								type="password"
								placeholder="New password"
								autocomplete="new-password"
								autocorrect="off"
								autocapitalize="off"
								spellcheck="false"
								required
							/>
						</div>
					</div>
					<label class="sr-only" for="confirm-password">Confirm new password</label>
					<div class="monaco-inputbox idle">
						<div class="ibwrapper">
							<input
								class="input empty"
								id="confirm-password"
								name="confirmPassword"
								type="password"
								placeholder="Confirm new password"
								autocomplete="new-password"
								autocorrect="off"
								autocapitalize="off"
								spellcheck="false"
								required
							/>
						</div>
					</div>
				</div>
				<button class="submit-button" type="submit">
					<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true" focusable="false">
  <path transform="translate(16 0) scale(-1 1)" d="M3 8C3 5.23858 5.23858 3 8 3C9.63527 3 11.0878 3.78495 12.0005 5H10C9.72386 5 9.5 5.22386 9.5 5.5C9.5 5.77614 9.72386 6 10 6H12.8904C12.8973 6.00014 12.9041 6.00014 12.911 6H13C13.2761 6 13.5 5.77614 13.5 5.5V2.5C13.5 2.22386 13.2761 2 13 2C12.7239 2 12.5 2.22386 12.5 2.5V4.03138C11.4009 2.78613 9.79253 2 8 2C4.68629 2 2 4.68629 2 8C2 11.3137 4.68629 14 8 14C11.1301 14 13.6999 11.6035 13.9756 8.54488C14.0003 8.26985 13.7975 8.0268 13.5225 8.00202C13.2474 7.97723 13.0044 8.1801 12.9796 8.45512C12.75 11.003 10.6079 13 8 13C5.23858 13 3 10.7614 3 8Z"/>
</svg>
					<span>Reset Password</span>
				</button>
				<div class="login-message" aria-live="polite">{{ERROR}}</div>
			</form>
		</main>
		<script src="{{COMPOSERY_STATIC_BASE}}/src/browser/pages/auth.js"></script>
	</body>
</html>
