name: cla

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened, closed, synchronize]

concurrency:
  group: cla-signatures-${{ github.repository }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: read

jobs:
  cla:
    # Only run the CLA assistant for the canonical Agentbox repo and relevant events.
    # issue_comment events must be pull request comments; regular issue comments are ignored.
    if: |
      github.repository == 'sloikodavid/agentbox' &&
      (
        (
          github.event_name == 'pull_request_target' &&
          (
            github.event.action == 'opened' ||
            github.event.action == 'reopened' ||
            github.event.action == 'synchronize' ||
            (github.event.action == 'closed' && github.event.pull_request.merged == true)
          )
        ) ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null
        )
      )
    runs-on: ubuntu-latest
    env:
      SIGN_COMMENT: I have read the CLA Document and I hereby sign the CLA.
    steps:
      - name: Classify CLA comment
        id: cla-comment
        if: ${{ github.event_name == 'issue_comment' }}
        shell: bash
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          normalized_comment="$(printf '%s' "$COMMENT_BODY" | tr '[:upper:]' '[:lower:]' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          normalized_signature="$(printf '%s' "$SIGN_COMMENT" | tr '[:upper:]' '[:lower:]' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"

          if [[ "$normalized_comment" == "recheck" || "$normalized_comment" == "$normalized_signature" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: CLA Assistant
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        if: |
          github.event_name == 'pull_request_target' ||
          steps.cla-comment.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: https://github.com/sloikodavid/agentbox/blob/main/.github/CLA.md
          # Bump this signature file version whenever CLA.md changes materially.
          path-to-signatures: signatures/cla-v1.json
          branch: cla-signatures
          allowlist: github-actions[bot],dependabot[bot],renovate[bot]
          custom-notsigned-prcomment: |
            Thanks for the contribution.

            Before this pull request can be merged, please read and sign the CLA:
            https://github.com/sloikodavid/agentbox/blob/main/.github/CLA.md

            To sign, add the following as a comment on this pull request:
          custom-pr-sign-comment: ${{ env.SIGN_COMMENT }}
          # Keep merged PR signature comments immutable after the CLA record is complete.
          lock-pullrequest-aftermerge: true
