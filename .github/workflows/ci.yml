name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: pnpm
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends git-lfs quilt
      # Cheap early gate: quilt-push our patch stack over pristine code-server with
      # fuzz=0, like build.sh, to catch patch drift before the full image build.
      - name: Verify IDE patch stack applies
        working-directory: packages/ide
        env:
          QUILT_PUSH_ARGS: "--fuzz=0"
        run: |
          while IFS= read -r p; do
            [ -z "$p" ] || { cp "patches/$p" "upstream/patches/$p"; printf '%s\n' "$p" >> upstream/patches/series; }
          done < patches/series
          cd upstream && QUILT_PATCHES=patches quilt push -a
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/cli
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      # Catches build/prerender errors tsc can't (e.g. ConvexReactClient's SSR
      # URL validation). The website ships on Vercel, so this only builds, it
      # doesn't deploy. No real secret needed: nothing here reads a runtime value.
      - run: pnpm --filter web build
        env:
          NEXT_PUBLIC_CONVEX_URL: https://convex.invalid
