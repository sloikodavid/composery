name: smoke

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
    inputs:
      ref:
        type: string
        default: ""
      no_cache:
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      no_cache:
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: amd64
            docker_platform: linux/amd64
            runner: ubuntu-24.04
          - platform: arm64
            docker_platform: linux/arm64
            runner: ubuntu-24.04-arm
    env:
      CONTAINER_NAME: agentbox-smoke-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.platform }}
      CUSTOM_VOLUME_NAME: agentbox-smoke-custom-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.platform }}
      IMAGE_TAG: agentbox:smoke-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.platform }}
      TLS_VOLUME_NAME: agentbox-smoke-tls-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.platform }}
      VOLUME_NAME: agentbox-smoke-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.platform }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.docker_platform }}
          load: true
          tags: ${{ env.IMAGE_TAG }}
          provenance: false
          no-cache: ${{ inputs.no_cache || false }}
      - name: Run smoke suite
        timeout-minutes: 25
        run: bash .github/scripts/smoke.sh
      - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        if: matrix.platform == 'amd64'
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          # Smoke uploads image findings to code scanning. release.yml is the
          # blocking vulnerability gate for stable releases.
          exit-code: "0"
      - uses: github/codeql-action/upload-sarif@5e316336eb4f107009e477d4bfbfff13d7250fae # v4
        if: >-
          always() &&
          matrix.platform == 'amd64' &&
          hashFiles('trivy-results.sarif') != '' &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: trivy-results.sarif
      - name: Debug Docker state
        if: failure()
        run: |
          docker ps -a || true
          docker logs "$CONTAINER_NAME" || true
      - name: Cleanup
        if: always()
        run: |
          docker rm -f "$CONTAINER_NAME" || true
          docker volume rm "$VOLUME_NAME" || true
          docker volume rm "$CUSTOM_VOLUME_NAME" || true
          docker volume rm "$TLS_VOLUME_NAME" || true
          docker image rm "$IMAGE_TAG" || true
