name: smoke

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
    inputs:
      ref:
        type: string
        default: ""
      no_cache:
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      no_cache:
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-26.04
          - arch: arm64
            runner: ubuntu-26.04-arm
    env:
      SMOKE_CONTAINER_NAME: composery-smoke-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.arch }}
      SMOKE_IMAGE_TAG: composery:smoke-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.arch }}
      SMOKE_NO_CACHE: ${{ inputs.no_cache || false }}
      SMOKE_VOLUME_NAME: composery-smoke-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: pnpm
      - name: Run smoke suite
        timeout-minutes: 50
        run: pnpm smoke
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: matrix.arch == 'amd64'
        with:
          image-ref: ${{ env.SMOKE_IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          # Non-blocking here; release.yml is the blocking vulnerability gate.
          exit-code: "0"
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: >-
          always() &&
          matrix.arch == 'amd64' &&
          hashFiles('trivy-results.sarif') != '' &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: trivy-results.sarif
      - name: Debug Docker state
        if: failure()
        run: |
          docker ps -a || true
          docker logs "$SMOKE_CONTAINER_NAME" || true
          docker exec "$SMOKE_CONTAINER_NAME" composery persistence status --json || true
          docker exec "$SMOKE_CONTAINER_NAME" sh -lc 'for file in /data/persistence/.internal/apply-error.log /data/persistence/.internal/watch-error.log; do if [ -f "$file" ]; then echo "== $file =="; cat "$file"; fi; done' || true
      - name: Cleanup
        if: always()
        run: |
          docker rm -f "$SMOKE_CONTAINER_NAME" || true
          docker volume rm "$SMOKE_VOLUME_NAME" || true
          docker image rm "$SMOKE_IMAGE_TAG" || true
