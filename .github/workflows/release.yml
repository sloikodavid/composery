name: release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to publish. Use main for a stable release; anything else is a preview release."
        required: true
        default: main

permissions:
  contents: write
  packages: write
  security-events: write
  id-token: write
  attestations: write

jobs:
  smoke:
    uses: ./.github/workflows/smoke.yml
    with:
      ref: ${{ inputs.ref }}
      no_cache: true

  plan:
    needs: smoke
    runs-on: ubuntu-24.04
    outputs:
      amd64_tags: ${{ steps.plan.outputs.amd64_tags }}
      arm64_tags: ${{ steps.plan.outputs.arm64_tags }}
      build_version: ${{ steps.plan.outputs.build_version }}
      cache_scope: ${{ steps.plan.outputs.cache_scope }}
      is_stable: ${{ steps.plan.outputs.is_stable }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      sha: ${{ steps.plan.outputs.sha }}
      tags: ${{ steps.plan.outputs.tags }}
      version: ${{ steps.plan.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Plan release
        id: plan
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/composery
          REF_INPUT: ${{ inputs.ref }}
        run: |
          set -euo pipefail

          git fetch origin main --tags

          sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          package_version="$(node -p 'require("./package.json").version')"

          if [[ ! "$package_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package.json version must be plain semver (X.Y.Z). Got: $package_version" >&2
            exit 1
          fi

          main_sha="$(git rev-parse origin/main)"
          if [[ "$REF_INPUT" == "main" && "$sha" == "$main_sha" ]]; then
            tag="v$package_version"
            if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "Release tag already exists: $tag" >&2
              exit 1
            fi

            major_minor="${package_version%.*}"
            build_version="$package_version"
            is_stable="true"
            cache_scope="release-stable"
            tags=(
              "$IMAGE:$package_version"
              "$IMAGE:$major_minor"
              "$IMAGE:latest"
              "$IMAGE:sha-$short_sha"
            )
          else
            safe_ref="$(printf '%s' "$REF_INPUT" | tr '/:@ ' '-' | tr -cd 'A-Za-z0-9_.-' | cut -c1-80)"
            if [[ -z "$safe_ref" ]]; then
              safe_ref="$short_sha"
            fi

            build_version="preview-$short_sha"
            is_stable="false"
            cache_scope="release-preview-$short_sha"
            tags=(
              "$IMAGE:preview-$safe_ref"
              "$IMAGE:sha-$short_sha"
            )
          fi

          amd64_tags=()
          arm64_tags=()
          for image_tag in "${tags[@]}"; do
            amd64_tags+=("$image_tag-amd64")
            arm64_tags+=("$image_tag-arm64")
          done

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
            echo "amd64_tags<<EOF"
            printf '%s\n' "${amd64_tags[@]}"
            echo "EOF"
            echo "arm64_tags<<EOF"
            printf '%s\n' "${arm64_tags[@]}"
            echo "EOF"
            echo "build_version=$build_version"
            echo "cache_scope=$cache_scope"
            echo "is_stable=$is_stable"
            echo "release_tag=v$package_version"
            echo "sha=$sha"
            echo "version=$package_version"
          } >> "$GITHUB_OUTPUT"

  build-amd64:
    needs: plan
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: build
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ needs.plan.outputs.amd64_tags }}
          labels: |
            org.opencontainers.image.title=Composery
            org.opencontainers.image.description=A persistent VPS-like Linux appliance with code-server in the browser.
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.plan.outputs.sha }}
            org.opencontainers.image.version=${{ needs.plan.outputs.build_version }}
            org.opencontainers.image.licenses=Apache-2.0
          sbom: true
          provenance: true
          build-args: |
            COMPOSERY_BUILD_VERSION=${{ needs.plan.outputs.build_version }}
            COMPOSERY_BUILD_REVISION=${{ needs.plan.outputs.sha }}
            COMPOSERY_BUILD_SOURCE=${{ github.server_url }}/${{ github.repository }}
          # Preview refs get per-commit caches so they cannot feed stable releases.
          cache-from: type=gha,scope=${{ needs.plan.outputs.cache_scope }}-amd64
          cache-to: type=gha,mode=max,scope=${{ needs.plan.outputs.cache_scope }}-amd64

  build-arm64:
    needs: plan
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: build
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ needs.plan.outputs.arm64_tags }}
          labels: |
            org.opencontainers.image.title=Composery
            org.opencontainers.image.description=A persistent VPS-like Linux appliance with code-server in the browser.
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.plan.outputs.sha }}
            org.opencontainers.image.version=${{ needs.plan.outputs.build_version }}
            org.opencontainers.image.licenses=Apache-2.0
          sbom: true
          provenance: true
          build-args: |
            COMPOSERY_BUILD_VERSION=${{ needs.plan.outputs.build_version }}
            COMPOSERY_BUILD_REVISION=${{ needs.plan.outputs.sha }}
            COMPOSERY_BUILD_SOURCE=${{ github.server_url }}/${{ github.repository }}
          # Preview refs get per-commit caches so they cannot feed stable releases.
          cache-from: type=gha,scope=${{ needs.plan.outputs.cache_scope }}-arm64
          cache-to: type=gha,mode=max,scope=${{ needs.plan.outputs.cache_scope }}-arm64

  publish:
    needs:
      - plan
      - build-amd64
      - build-arm64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform manifest
        id: manifest
        env:
          AMD64_DIGEST: ${{ needs.build-amd64.outputs.digest }}
          AMD64_TAGS: ${{ needs.plan.outputs.amd64_tags }}
          ARM64_DIGEST: ${{ needs.build-arm64.outputs.digest }}
          ARM64_TAGS: ${{ needs.plan.outputs.arm64_tags }}
          TAGS: ${{ needs.plan.outputs.tags }}
        run: |
          set -euo pipefail

          mapfile -t tags <<< "$TAGS"
          mapfile -t amd64_tags <<< "$AMD64_TAGS"
          mapfile -t arm64_tags <<< "$ARM64_TAGS"

          first_non_empty() {
            local value
            for value in "$@"; do
              if [[ -n "$value" ]]; then
                printf '%s\n' "$value"
                return 0
              fi
            done
            return 1
          }

          source_ref() {
            local tag="$1"
            local digest="$2"
            case "$digest" in
              sha256:*) printf '%s@%s\n' "$tag" "$digest" ;;
              *@sha256:*) printf '%s\n' "$digest" ;;
              *)
                echo "Unexpected Docker digest: $digest" >&2
                return 1
                ;;
            esac
          }

          primary_tag="$(first_non_empty "${tags[@]}")"
          amd64_tag="$(first_non_empty "${amd64_tags[@]}")"
          arm64_tag="$(first_non_empty "${arm64_tags[@]}")"
          amd64_ref="$(source_ref "$amd64_tag" "$AMD64_DIGEST")"
          arm64_ref="$(source_ref "$arm64_tag" "$ARM64_DIGEST")"

          args=()
          for image_tag in "${tags[@]}"; do
            [[ -z "$image_tag" ]] && continue
            args+=("-t" "$image_tag")
          done

          docker buildx imagetools create "${args[@]}" "$amd64_ref" "$arm64_ref"

          docker buildx imagetools inspect "$primary_tag" --format '{{json .Manifest}}' > manifest.json
          digest="$(jq -r '.digest // empty' manifest.json)"
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Could not resolve manifest digest for $primary_tag" >&2
            cat manifest.json >&2
            exit 1
          fi

          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/composery@${{ steps.manifest.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          limit-severities-for-sarif: true
          exit-code: "0"

      - uses: github/codeql-action/upload-sarif@5e316336eb4f107009e477d4bfbfff13d7250fae # v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif

      - uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/composery
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        if: needs.plan.outputs.is_stable == 'true'
        with:
          tag_name: ${{ needs.plan.outputs.release_tag }}
          target_commitish: ${{ needs.plan.outputs.sha }}
          generate_release_notes: true
          body: |
            Image: `ghcr.io/${{ github.repository_owner }}/composery:${{ needs.plan.outputs.version }}`
            Digest: `${{ steps.manifest.outputs.digest }}`
