services:
  composery:
    image: ghcr.io/sloikodavid/composery:latest
    restart: unless-stopped
    command: ["systemd"]
    env_file: ./composery.env
    privileged: true
    cgroup: host
    stop_signal: SIGRTMIN+3
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - composery_data:/data
    ports:
      - "8080:8080"

volumes:
  composery_data:
